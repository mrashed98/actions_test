name: Software Bill of Material Generation

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: 'sbom'
        description: 'Base name for SBOM output files (e.g. my-app → my-app.spdx.json)'
      release-tag:
        required: false
        type: string
        default: ''
        description: 'Release tag to attach SBOM assets to. Pass github.event.release.tag_name from caller.'

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: ${{ inputs.artifact-name || 'sbom' }}.spdx.json
          artifact-name: ${{ inputs.artifact-name || 'sbom' }}.spdx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: true

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: ${{ inputs.artifact-name || 'sbom' }}.cyclonedx.json
          artifact-name: ${{ inputs.artifact-name || 'sbom' }}.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: false

      - name: Attach to release
        if: github.event_name == 'release' || inputs.release-tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.release-tag || github.event.release.tag_name }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo "::error::Release $tag does not exist"
            exit 1
          fi
          gh release upload "$tag" \
            "${{ inputs.artifact-name || 'sbom' }}.spdx.json" \
            "${{ inputs.artifact-name || 'sbom' }}.cyclonedx.json" \
            --clobber
