name: Lint & Format

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  Linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Install dependencies
        run: go mod tidy
      - name: Run go Format
        id: fmt
        run: |
          files=$(gofmt -l ./...)
          if [ -n "$files" ]; then
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$files" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Post fmt comment
        if: failure() && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **go fmt** found formatting issues in:\n\`\`\`\n${{ steps.fmt.outputs.output }}\n\`\`\`\nRun \`gofmt -w ./...\` to fix.`
            })
      - name: Run go vet
        id: vet
        run: |
          set +e
          output=$(go vet ./... 2>&1)
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit $exit_code
          fi
      - name: Post vet comment
        if: failure() && steps.vet.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **go vet** found issues:\n\`\`\`\n${{ steps.vet.outputs.output }}\n\`\`\``
            })
  GoLangCI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Run golangCI-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
