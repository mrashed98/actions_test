name: Lint & Format

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  Linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Install dependencies
        run: go mod tidy
      - name: Run go Format
        id: fmt
        run: |
          files=$(find . -name "*.go" -not -path "*/vendor/*" | xargs gofmt -l 2>/dev/null)
          if [ -n "$files" ]; then
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$files" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Post fmt comment
        if: always() && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          FMT_OUTPUT: ${{ steps.fmt.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- go-fmt-comment -->';
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${marker}\n❌ **go fmt** found formatting issues in:\n\`\`\`\n${process.env.FMT_OUTPUT}\n\`\`\`\nRun \`gofmt -w ./...\` to fix.`
            });
      - name: Run go vet
        id: vet
        if: always()
        run: |
          set +e
          output=$(go vet ./... 2>&1)
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "output<<EOF" >> $GITHUB_OUTPUT
            echo "$output" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit $exit_code
          fi
      - name: Post vet comment
        if: always() && steps.vet.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          VET_OUTPUT: ${{ steps.vet.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- go-vet-comment -->';
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${marker}\n❌ **go vet** found issues:\n\`\`\`\n${process.env.VET_OUTPUT}\n\`\`\``
            });
  GoLangCI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Run golangCI-lint
        id: golangci
        continue-on-error: true
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Post golangci comment
        if: always() && steps.golangci.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const marker = '<!-- golangci-lint-comment -->';
            let output = '';
            try {
              execSync('golangci-lint run --color never ./...', { encoding: 'utf8' });
            } catch (e) {
              output = ((e.stdout || '') + (e.stderr || '')).replace(/^::.*/gm, '').trim();
            }
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${marker}\n❌ **golangci-lint** found issues:\n\`\`\`\n${output}\n\`\`\``
            });
      - name: Fail job if lint failed
        if: always() && steps.golangci.outcome == 'failure'
        run: exit 1
