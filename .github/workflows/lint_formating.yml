name: Lint & Format

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  Linter:
    runs-on: ubunutu-latest
    steps:
      - name: Checkout code 
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go  
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Install dependencies
        run: go mod tidy  
      - name: Run go Format
        run: go fmt
      - name: Run go vet  
        run: go vet
  GoLangCI:
    runs-on: ubunutu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Run golangCI-lint
        uses: golangci/golangci-lint-action@v9.2.0


