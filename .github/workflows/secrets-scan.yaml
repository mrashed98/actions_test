name: Secrets Scan

on:
  push:
      branches:
        - main
  pull_request: 

jobs:
  Check_Leaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 
        uses: actions/chekout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

