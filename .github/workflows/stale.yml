name: Stale

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days and is marked stale.
            It will be closed in 7 days unless there is new activity.
            Remove the `stale` label or comment to keep it open.
          stale-pr-message: >
            This PR has been inactive for 60 days and is marked stale.
            It will be closed in 7 days unless there is new activity.
            Remove the `stale` label or comment to keep it open.
          close-issue-message: >
            This issue was closed due to inactivity. Reopen if still relevant.
          close-pr-message: >
            This PR was closed due to inactivity. Reopen if still relevant.
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
          operations-per-run: 100
