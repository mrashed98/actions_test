name: SAST

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      pull-requests: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  coverage:
    name: Test & Doc Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'

      - name: Install dependencies
        run: go mod tidy

      - name: Test coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 70)}"; then
            echo "::error::Test coverage ${COVERAGE}% is below threshold of 70%"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: warn

      - name: Install revive
        run: go install github.com/mgechev/revive@v1.5.1

      - name: Doc coverage (exported symbols)
        run: |
          cat > /tmp/revive-exported.toml << 'EOF'
          [rule.exported]
            severity = "error"
            arguments = ["checkPrivateReceivers", "sayRepetitiveInsteadOfStutters"]
          EOF
          revive -config /tmp/revive-exported.toml -formatter friendly ./... 2>&1 | tee /tmp/revive-output.txt
          VIOLATIONS=$(wc -l < /tmp/revive-output.txt | tr -d ' ')
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::${VIOLATIONS} exported symbol(s) have documentation issues"
            exit 1
          fi
